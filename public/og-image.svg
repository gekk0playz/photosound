<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#b84ef1;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d07bf8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#b84ef1;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="0" rx="600" ry="300" fill="url(#glow)"/>
  <circle cx="900" cy="450" r="200" fill="url(#orb)"/>
  <circle cx="200" cy="200" r="120" fill="url(#orb)"/>

  <!-- Logo mark -->
  <rect x="525" y="150" width="150" height="150" rx="30" fill="rgba(184,78,241,0.15)" stroke="rgba(184,78,241,0.4)" stroke-width="2"/>
  <text x="600" y="235" font-family="Inter,Arial,sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle">PS</text>

  <!-- Title -->
  <text x="600" y="400" font-family="Inter,Arial,sans-serif" font-size="64" font-weight="900" fill="white" text-anchor="middle">PhotoSound</text>
  <text x="600" y="460" font-family="Inter,Arial,sans-serif" font-size="28" fill="rgba(255,255,255,0.6)" text-anchor="middle">Turn any photo into a song</text>

  <!-- Waveform bars -->
  <rect x="470" y="490" width="8" height="30" rx="4" fill="#b84ef1" opacity="0.7">
    <animate attributeName="height" values="30;60;30" dur="1.2s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="y" values="490;460;490" dur="1.2s" repeatCount="indefinite" begin="0s"/>
  </rect>
  <rect x="490" y="480" width="8" height="40" rx="4" fill="#b84ef1" opacity="0.8">
    <animate attributeName="height" values="40;70;40" dur="1.2s" repeatCount="indefinite" begin="0.1s"/>
    <animate attributeName="y" values="480;450;480" dur="1.2s" repeatCount="indefinite" begin="0.1s"/>
  </rect>
  <rect x="510" y="470" width="8" height="50" rx="4" fill="#b84ef1">
    <animate attributeName="height" values="50;80;50" dur="1.2s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="y" values="470;440;470" dur="1.2s" repeatCount="indefinite" begin="0.2s"/>
  </rect>
  <rect x="530" y="465" width="8" height="55" rx="4" fill="#b84ef1">
    <animate attributeName="height" values="55;85;55" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="y" values="465;435;465" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </rect>
  <rect x="550" y="470" width="8" height="50" rx="4" fill="#b84ef1">
    <animate attributeName="height" values="50;80;50" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="y" values="470;440;470" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
  </rect>
  <rect x="570" y="480" width="8" height="40" rx="4" fill="#b84ef1" opacity="0.8">
    <animate attributeName="height" values="40;70;40" dur="1.2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="y" values="480;450;480" dur="1.2s" repeatCount="indefinite" begin="0.5s"/>
  </rect>
  <rect x="590" y="490" width="8" height="30" rx="4" fill="#b84ef1" opacity="0.7">
    <animate attributeName="height" values="30;60;30" dur="1.2s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="y" values="490;460;490" dur="1.2s" repeatCount="indefinite" begin="0.6s"/>
  </rect>
  <rect x="610" y="480" width="8" height="40" rx="4" fill="#b84ef1" opacity="0.8">
    <animate attributeName="height" values="40;70;40" dur="1.2s" repeatCount="indefinite" begin="0.7s"/>
    <animate attributeName="y" values="480;450;480" dur="1.2s" repeatCount="indefinite" begin="0.7s"/>
  </rect>
  <rect x="630" y="470" width="8" height="50" rx="4" fill="#b84ef1">
    <animate attributeName="height" values="50;80;50" dur="1.2s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="y" values="470;440;470" dur="1.2s" repeatCount="indefinite" begin="0.8s"/>
  </rect>
  <rect x="650" y="480" width="8" height="40" rx="4" fill="#b84ef1" opacity="0.8">
    <animate attributeName="height" values="40;70;40" dur="1.2s" repeatCount="indefinite" begin="0.9s"/>
    <animate attributeName="y" values="480;450;480" dur="1.2s" repeatCount="indefinite" begin="0.9s"/>
  </rect>
  <rect x="670" y="490" width="8" height="30" rx="4" fill="#b84ef1" opacity="0.7">
    <animate attributeName="height" values="30;60;30" dur="1.2s" repeatCount="indefinite" begin="1.0s"/>
    <animate attributeName="y" values="490;460;490" dur="1.2s" repeatCount="indefinite" begin="1.0s"/>
  </rect>
  <rect x="690" y="500" width="8" height="20" rx="4" fill="#b84ef1" opacity="0.5">
    <animate attributeName="height" values="20;50;20" dur="1.2s" repeatCount="indefinite" begin="1.1s"/>
    <animate attributeName="y" values="500;470;500" dur="1.2s" repeatCount="indefinite" begin="1.1s"/>
  </rect>

  <!-- Footer note -->
  <text x="600" y="600" font-family="Inter,Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle">photosound.vercel.app</text>
</svg>